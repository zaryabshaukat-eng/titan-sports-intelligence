services:
  api:
    build:
      context: ./backend
    environment:
      TITAN_APP_ENV: ${TITAN_APP_ENV:-development}
      TITAN_LOG_LEVEL: ${TITAN_LOG_LEVEL:-INFO}
      TITAN_DOCS_ENABLED: ${TITAN_DOCS_ENABLED:-true}
      TITAN_METRICS_ENABLED: ${TITAN_METRICS_ENABLED:-true}
      TITAN_CORS_ORIGINS: ${TITAN_CORS_ORIGINS:-http://localhost:5000}
      TITAN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-titan}:${POSTGRES_PASSWORD:-titan}@db:5432/${POSTGRES_DB:-titan}
      TITAN_TEST_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-titan}:${POSTGRES_PASSWORD:-titan}@db:5432/${POSTGRES_DB:-titan}
      TITAN_REDIS_URL: redis://redis:6379/0
      TITAN_SECRET_KEY: ${TITAN_SECRET_KEY:-local-development-secret-change-before-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-titan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-titan}
      POSTGRES_DB: ${POSTGRES_DB:-titan}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
